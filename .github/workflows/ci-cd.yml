name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: autobio-b5dbf.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: autobio-b5dbf
          VITE_FIREBASE_STORAGE_BUCKET: autobio-b5dbf.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '1012550333400'
          VITE_FIREBASE_APP_ID: '1:1012550333400:web:727b3500b26968c9cff8ad'
          VITE_FIREBASE_MEASUREMENT_ID: G-XDSHR161PL

      - name: Build functions
        run: npm run functions:build

  deploy:
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: autobio-b5dbf.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: autobio-b5dbf
          VITE_FIREBASE_STORAGE_BUCKET: autobio-b5dbf.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '1012550333400'
          VITE_FIREBASE_APP_ID: '1:1012550333400:web:727b3500b26968c9cff8ad'
          VITE_FIREBASE_MEASUREMENT_ID: G-XDSHR161PL

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only hosting,functions,firestore:rules,storage --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.Firebase }}
          TRANSCRIPTION_WORKER_URL: https://autobio-transcription-1012550333400.us-central1.run.app

  deploy-transcription-worker:
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy transcription worker to Cloud Run
        run: |
          gcloud run deploy autobio-transcription \
            --source services/transcription-worker \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 600 \
            --min-instances 1 \
            --update-env-vars WHISPER_MODEL=small \
            --update-env-vars WHISPER_DEVICE=cpu
